[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_BASE = ""

[[redirects]]
  from = "/api/*"
  to = "https://tiger-mail.onrender.com/api/*"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://tiger-mail.onrender.com/uploads/*"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
